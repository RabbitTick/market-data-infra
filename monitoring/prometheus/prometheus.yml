global:
  scrape_interval: 5s

scrape_configs:
  - job_name: "market-data-persister"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["persister:8080"]

  - job_name: "market-ingest-streamer"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["ingest:8080"]
